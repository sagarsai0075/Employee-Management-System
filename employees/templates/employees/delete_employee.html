{% extends 'employees/base.html' %}

{% block content %}

<h2>Delete Employee</h2>

<p>Are you sure you want to delete {{ employee.name }}?</p>

<form method="POST">
    {% csrf_token %}
    <button type="submit">Yes, Delete</button>
</form>

<a href="{% url 'employee_list' %}">Cancel</a>

{% endblock %}
